<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADD Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #1a1a2e; }
    .viewer {
      display: flex;
      height: 100vh;
      width: 100vw;
    }
    .content {
      width: 80%;
      height: 100%;
    }
    .content iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .video {
      width: 20%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: flex-start;
    }
    .video video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .back-btn {
      position: fixed;
      top: 8px;
      right: calc(20% + 8px);
      z-index: 1000;
      padding: 4px 10px;
      font-size: 0.8rem;
      font-weight: 600;
      border: none;
      border-radius: 4px;
      background: #e94560;
      color: white;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .back-btn:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="viewer">
    <div class="content">
      <iframe id="webpage"></iframe>
    </div>
    <div class="video">
      <video autoplay muted loop playsinline>
        <source src="subway.mp4" type="video/mp4">
      </video>
    </div>
  </div>
  <button class="back-btn" onclick="window.location.href='index.html'">Back</button>
  <script>
    const params = new URLSearchParams(window.location.search);
    const url = params.get('url');
    if (url) {
      document.getElementById('webpage').src = '/proxy?url=' + encodeURIComponent(url);
    } else {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
